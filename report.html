<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Khon Kaen Smart Guide</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #22b800;
            --danger: #e53935;
            --text-main: #e0e0e0;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Chakra Petch', sans-serif;
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 36px;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #333;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--text-muted);
            font-weight: 400;
        }

        .card .value {
            font-size: 40px;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            color: var(--primary);
            margin: 0;
        }

        /* Table Styles */
        .table-container {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #333;
            overflow-x: auto;
            margin-bottom: 30px;
        }

        .table-container h2 {
            margin-top: 0;
            font-family: 'Chakra Petch', sans-serif;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        th {
            color: var(--primary);
            font-weight: 600;
            white-space: nowrap;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Reset Section */
        .reset-section {
            text-align: right;
            padding: 20px 0;
            border-top: 1px dashed #444;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 15px 25px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(229, 57, 53, 0.3);
        }

        .btn-danger:hover {
            background-color: #c62828;
        }

        .btn-danger:active {
            transform: scale(0.98);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 ระบบรายงานผลนิทรรศการ</h1>
        <p>Khon Kaen Smart Guide - Dashboard</p>
    </div>

    <div class="dashboard-container" id="appContent">
        <div class="loading" id="loadingState">
            ⏳ กำลังโหลดข้อมูลจากฐานข้อมูล...
        </div>

        <div id="dashboardData" style="display: none;">
            
            <div class="summary-grid">
                <div class="card">
                    <h3>ผู้ใช้งานระบบทั้งหมด (Sessions)</h3>
                    <p class="value" id="totalVisitors">0</p>
                </div>
                <div class="card">
                    <h3>ยอดการเช็คอินรวม (ครั้ง)</h3>
                    <p class="value" id="totalCheckins">0</p>
                </div>
            </div>

            <div class="table-container">
                <h2>📍 สถิติการเข้าชมแบ่งตามสถานที่</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ลำดับ</th>
                            <th>ชื่อสถานที่จัดแสดง</th>
                            <th style="text-align: center;">จำนวนการเช็คอิน (คน)</th>
                            <th>อัปเดตล่าสุดเมื่อ (วัน-เวลา)</th>
                        </tr>
                    </thead>
                    <tbody id="checkinTableBody">
                        </tbody>
                </table>
            </div>

            <div class="reset-section">
                <button class="btn-danger" id="resetBtn">⚠️ ลบข้อมูลรายงานทั้งหมด</button>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Firebase Config ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyCJ-E8bN9nz_BWKTNofz7ccuVoo6m8LyAU",
            authDomain: "suchart-915bd.firebaseapp.com",
            projectId: "suchart-915bd",
            storageBucket: "suchart-915bd.firebasestorage.app",
            messagingSenderId: "94380768305",
            appId: "1:94380768305:web:c4705ea3e0d53e1b61a910",
            measurementId: "G-2LNYQS3M52"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // แปลงรูปแบบวันที่ให้อ่านง่าย
        function formatDate(isoString) {
            if (!isoString) return "-";
            const date = new Date(isoString);
            return date.toLocaleString('th-TH', { 
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });
        }

        // โหลดข้อมูลและแสดงผลบน Dashboard
        async function loadDashboard() {
            try {
                // 1. ดึงข้อมูล Sessions (ผู้ใช้ทั้งหมด)
                const visitorsSnap = await getDocs(collection(db, "visitor_logs"));
                document.getElementById('totalVisitors').innerText = visitorsSnap.size;

                // 2. ดึงข้อมูล Check-ins (การเช็คอินสถานที่)
                const checkinsSnap = await getDocs(collection(db, "checkins"));
                document.getElementById('totalCheckins').innerText = checkinsSnap.size;

                // 3. จัดกลุ่มข้อมูลการเช็คอินตามชื่อสถานที่
                const locationStats = {};
                
                checkinsSnap.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();
                    const locName = data.location_name || "ไม่ระบุชื่อสถานที่";
                    const timestamp = data.timestamp;

                    if (!locationStats[locName]) {
                        locationStats[locName] = {
                            count: 0,
                            latestTime: timestamp
                        };
                    }

                    locationStats[locName].count += 1;
                    
                    // หาเวลาที่ใหม่ที่สุด
                    if (new Date(timestamp) > new Date(locationStats[locName].latestTime)) {
                        locationStats[locName].latestTime = timestamp;
                    }
                });

                // 4. สร้างแถวข้อมูลในตาราง
                const tbody = document.getElementById('checkinTableBody');
                tbody.innerHTML = ''; // ล้างค่าเดิม
                
                // แปลง Object เป็น Array เพื่อเอามาเรียงลำดับ (เรียงตามยอดเช็คอินเยอะสุด)
                const sortedLocations = Object.entries(locationStats).sort((a, b) => b[1].count - a[1].count);

                if (sortedLocations.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #888;">ยังไม่มีข้อมูลการเช็คอินในขณะนี้</td></tr>`;
                } else {
                    sortedLocations.forEach(([name, stats], index) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${index + 1}</td>
                            <td>${name}</td>
                            <td style="text-align: center; color: #ffcc80; font-weight: bold; font-size: 18px;">${stats.count}</td>
                            <td style="color: #a5d6a7;">${formatDate(stats.latestTime)}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }

                // ปิดโหลดเดอร์และแสดงหน้าต่างจริง
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('dashboardData').style.display = 'block';

            } catch (error) {
                console.error("Error loading dashboard data:", error);
                document.getElementById('loadingState').innerText = "❌ เกิดข้อผิดพลาดในการดึงข้อมูล กรุณารีเฟรชหน้าเว็บ";
            }
        }

        // ฟังก์ชันลบข้อมูลทั้งหมด
        async function resetAllData() {
            // หน้าต่างแจ้งเตือน (Confirmation Dialog)
            const isConfirmed = confirm(
                "⚠️ คำเตือนอันตราย!\n\n" +
                "คุณกำลังจะลบข้อมูลประวัติการใช้งานและการเช็คอิน 'ทั้งหมด' ออกจากฐานข้อมูล\n\n" +
                "ข้อมูลที่ถูกลบไปแล้วจะไม่สามารถกู้คืนได้ คุณแน่ใจหรือไม่ที่จะดำเนินการต่อ?"
            );

            if (isConfirmed) {
                const resetBtn = document.getElementById('resetBtn');
                resetBtn.innerText = "⏳ กำลังลบข้อมูล...";
                resetBtn.disabled = true;
                resetBtn.style.backgroundColor = "#555";

                try {
                    // ลบข้อมูลใน Collection: checkins
                    const checkinsSnap = await getDocs(collection(db, "checkins"));
                    const deleteCheckinsPromises = checkinsSnap.docs.map(d => deleteDoc(doc(db, "checkins", d.id)));
                    await Promise.all(deleteCheckinsPromises);

                    // ลบข้อมูลใน Collection: visitor_logs
                    const visitorsSnap = await getDocs(collection(db, "visitor_logs"));
                    const deleteVisitorsPromises = visitorsSnap.docs.map(d => deleteDoc(doc(db, "visitor_logs", d.id)));
                    await Promise.all(deleteVisitorsPromises);

                    alert("✅ ลบข้อมูลรายงานทั้งหมดสำเร็จแล้ว");
                    window.location.reload(); // โหลดหน้าใหม่เพื่ออัปเดตตัวเลขเป็น 0
                } catch (error) {
                    console.error("Error deleting data: ", error);
                    alert("❌ เกิดข้อผิดพลาดขณะลบข้อมูล");
                    resetBtn.innerText = "⚠️ ลบข้อมูลรายงานทั้งหมด";
                    resetBtn.disabled = false;
                    resetBtn.style.backgroundColor = "var(--danger)";
                }
            }
        }

        // ผูก Event ให้กับปุ่ม Reset
        document.getElementById('resetBtn').addEventListener('click', resetAllData);

        // เริ่มต้นทำงานทันทีเมื่อเปิดหน้านี้
        loadDashboard();
    </script>
</body>
</html>
